services:
  base-donnees:
    image: mysql:8.0
    container_name: suivi-depenses-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_MOT_DE_PASSE}
      MYSQL_DATABASE: gestion_finances
    volumes:
      - donnees-mysql:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_MOT_DE_PASSE}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suivi-depenses-api
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://base-donnees:3306/gestion_finances?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_MOT_DE_PASSE}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      base-donnees:
        condition: service_healthy

  interface:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: suivi-depenses-interface
    restart: unless-stopped
    ports:
      - "${INTERFACE_PORT:-80}:80"
    depends_on:
      api:
        condition: service_started

volumes:
  donnees-mysql:
