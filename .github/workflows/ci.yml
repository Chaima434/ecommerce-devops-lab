name: Continuous Integration (CI)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  # 1. Backend CI: Spring Boot Verification
  backend-ci:
    name: Backend CI (Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

  # 2. Frontend CI: Angular Verification
  frontend-ci:
    name: Frontend CI (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  # 3. Infrastructure and Configuration Verification (IaC)
  iac-validation:
    name: IaC Validation (Terraform & Ansible)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Terraform Setup & Validation
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"

      - name: Terraform Init and Validate
        working-directory: terraform
        run: |
          terraform init -backend=false
          terraform validate

      # Ansible Setup & Syntax Check
      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Ansible Syntax Check
        working-directory: ansible
        run: |
          ansible-playbook --syntax-check -i inventory.ini playbook.yml

  # 4. Docker Build Verification
  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Backend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: suivi-depenses-api:latest

      - name: Verify Frontend Docker Build
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: suivi-depenses-interface:latest

  # 5. Output Deployment Details & URLs
  deployment-summary:
    name: 🚀 Deployment Summary & Links
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, iac-validation, docker-validation]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract IP and Generate Summary
        run: |
          # Extract the IP address from inventory.ini
          IP=$(grep -E '^[0-9]' ansible/inventory.ini | awk '{print $1}')
          
          if [ -z "$IP" ]; then
            echo "Error: Could not extract IP address from inventory.ini"
            exit 1
          fi
          
          echo "### 🚀 Personal Finance Tracker Deployment Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The infrastructure has been successfully provisioned. Here are the access details for your environment:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL / Access Command |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **🖥️ Frontend UI** | [http://$IP](http://$IP) |" >> $GITHUB_STEP_SUMMARY
          echo "| **⚙️ Backend API** | [http://$IP:8080/api/](http://$IP:8080/api/) |" >> $GITHUB_STEP_SUMMARY
          echo "| **🔑 SSH Server Access** | \`ssh -i ~/Downloads/chaima.pem ubuntu@$IP\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!TIP]" >> $GITHUB_STEP_SUMMARY
          echo "> To configure the server and deploy the code, execute your Ansible playbook: \`ansible-playbook -i inventory.ini playbook.yml\` inside the \`ansible\` directory!" >> $GITHUB_STEP_SUMMARY

