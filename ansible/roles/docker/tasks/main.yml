---
- name: Update apt packages cache
  apt:
    update_cache: yes
    force_apt_get: yes

- name: Install system prerequisites for Docker
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - software-properties-common
    state: present

- name: Create directory for Docker APT keyring
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Add Docker official GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
    keyring: /etc/apt/keyrings/docker.gpg

- name: Get system architecture
  command: dpkg --print-architecture
  register: deb_arch
  changed_when: false

- name: Add Docker repository to apt sources
  apt_repository:
    repo: "deb [arch={{ deb_arch.stdout }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker

- name: Install Docker and Docker Compose packages
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Ensure Docker service is running and enabled
  service:
    name: docker
    state: started
    enabled: yes

- name: Add current SSH user to the docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes

- name: Reset connection to apply docker group membership
  meta: reset_connection
