<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Diagramme de Classes – Gestion Finances Personnelles</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
  h1 { text-align: center; color: #333; font-size: 20px; margin-bottom: 20px; }
  svg text { font-family: Arial, sans-serif; }
  .class-box { cursor: pointer; }
  .class-box:hover rect { filter: brightness(0.95); }
</style>
</head>
<body>
<h1>Diagramme de Classes – Application de Gestion des Finances Personnelles</h1>
<svg width="100%" viewBox="0 0 1100 1250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0L10 5L0 10" fill="none" stroke="#555" stroke-width="1.5"/>
    </marker>
    <marker id="diamond" viewBox="0 0 14 8" refX="0" refY="4" markerWidth="10" markerHeight="10" orient="auto">
      <polygon points="0,4 7,0 14,4 7,8" fill="white" stroke="#555" stroke-width="1"/>
    </marker>
    <marker id="inherit" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="white" stroke="#555" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- ============================================================ -->
  <!-- Utilisateur  (centre haut) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="380" y="20" width="240" height="140" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
    <!-- header -->
    <rect x="380" y="20" width="240" height="32" rx="6" fill="#7C3AED"/>
    <rect x="380" y="38" width="240" height="14" fill="#7C3AED"/>
    <text x="500" y="41" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Utilisateur</text>
    <line x1="380" y1="52" x2="620" y2="52" stroke="#7C3AED" stroke-width="1"/>
    <!-- attributes -->
    <text x="392" y="67" fill="#1E1B4B" font-size="11">- id : Long</text>
    <text x="392" y="82" fill="#1E1B4B" font-size="11">- nom : String</text>
    <text x="392" y="97" fill="#1E1B4B" font-size="11">- email : String</text>
    <text x="392" y="112" fill="#1E1B4B" font-size="11">- motDePasse : String</text>
    <text x="392" y="127" fill="#1E1B4B" font-size="11">- dateInscription : Date</text>
    <line x1="380" y1="136" x2="620" y2="136" stroke="#7C3AED" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="392" y="152" fill="#1E1B4B" font-size="11">+ seConnecter() : void</text>
  </g>

  <!-- ============================================================ -->
  <!-- Transaction  (gauche) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="20" y="240" width="250" height="185" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <rect x="20" y="240" width="250" height="32" rx="6" fill="#2563EB"/>
    <rect x="20" y="258" width="250" height="14" fill="#2563EB"/>
    <text x="145" y="261" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Transaction</text>
    <line x1="20" y1="272" x2="270" y2="272" stroke="#2563EB" stroke-width="1"/>
    <text x="32" y="287" fill="#1E3A8A" font-size="11">- id : Long</text>
    <text x="32" y="302" fill="#1E3A8A" font-size="11">- montant : Double</text>
    <text x="32" y="317" fill="#1E3A8A" font-size="11">- date : Date</text>
    <text x="32" y="332" fill="#1E3A8A" font-size="11">- type : TypeTransaction</text>
    <text x="32" y="347" fill="#1E3A8A" font-size="11">- description : String</text>
    <text x="32" y="362" fill="#1E3A8A" font-size="11">- source : String</text>
    <line x1="20" y1="372" x2="270" y2="372" stroke="#2563EB" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="32" y="387" fill="#1E3A8A" font-size="11">+ categoriser() : void</text>
    <text x="32" y="402" fill="#1E3A8A" font-size="11">+ filtrer() : List&lt;Transaction&gt;</text>
    <text x="32" y="417" fill="#1E3A8A" font-size="11">+ importer(fichier) : void</text>
  </g>

  <!-- ============================================================ -->
  <!-- Categorie  (droite) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="730" y="240" width="240" height="152" rx="6" fill="#CCFBF1" stroke="#0D9488" stroke-width="1.5"/>
    <rect x="730" y="240" width="240" height="32" rx="6" fill="#0D9488"/>
    <rect x="730" y="258" width="240" height="14" fill="#0D9488"/>
    <text x="850" y="261" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Categorie</text>
    <line x1="730" y1="272" x2="970" y2="272" stroke="#0D9488" stroke-width="1"/>
    <text x="742" y="287" fill="#134E4A" font-size="11">- id : Long</text>
    <text x="742" y="302" fill="#134E4A" font-size="11">- nom : String</text>
    <text x="742" y="317" fill="#134E4A" font-size="11">- type : String</text>
    <text x="742" y="332" fill="#134E4A" font-size="11">- couleur : String</text>
    <text x="742" y="347" fill="#134E4A" font-size="11">- personnalisee : Boolean</text>
    <line x1="730" y1="357" x2="970" y2="357" stroke="#0D9488" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="742" y="372" fill="#134E4A" font-size="11">+ creer() : void</text>
    <text x="742" y="387" fill="#134E4A" font-size="11">+ modifier() : void</text>
  </g>

  <!-- ============================================================ -->
  <!-- TypeTransaction  (enum, centre) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="380" y="240" width="200" height="110" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
    <rect x="380" y="240" width="200" height="32" rx="6" fill="#6B7280"/>
    <rect x="380" y="258" width="200" height="14" fill="#6B7280"/>
    <text x="480" y="254" text-anchor="middle" fill="white" font-size="10">«enumeration»</text>
    <text x="480" y="269" text-anchor="middle" fill="white" font-size="12" font-weight="bold">TypeTransaction</text>
    <line x1="380" y1="272" x2="580" y2="272" stroke="#6B7280" stroke-width="1"/>
    <text x="392" y="289" fill="#374151" font-size="11">REVENU</text>
    <text x="392" y="307" fill="#374151" font-size="11">DEPENSE</text>
    <text x="392" y="325" fill="#374151" font-size="11">VIREMENT</text>
    <text x="392" y="343" fill="#374151" font-size="11">EPARGNE</text>
  </g>

  <!-- ============================================================ -->
  <!-- Budget  (gauche milieu) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="20" y="510" width="260" height="185" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <rect x="20" y="510" width="260" height="32" rx="6" fill="#D97706"/>
    <rect x="20" y="528" width="260" height="14" fill="#D97706"/>
    <text x="150" y="531" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Budget</text>
    <line x1="20" y1="542" x2="280" y2="542" stroke="#D97706" stroke-width="1"/>
    <text x="32" y="557" fill="#78350F" font-size="11">- id : Long</text>
    <text x="32" y="572" fill="#78350F" font-size="11">- montantAlloue : Double</text>
    <text x="32" y="587" fill="#78350F" font-size="11">- montantDepense : Double</text>
    <text x="32" y="602" fill="#78350F" font-size="11">- mois : Integer</text>
    <text x="32" y="617" fill="#78350F" font-size="11">- annee : Integer</text>
    <text x="32" y="632" fill="#78350F" font-size="11">- categorieId : Long</text>
    <line x1="20" y1="642" x2="280" y2="642" stroke="#D97706" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="32" y="657" fill="#78350F" font-size="11">+ calculerSolde() : Double</text>
    <text x="32" y="672" fill="#78350F" font-size="11">+ verifierDepassement() : Boolean</text>
    <text x="32" y="687" fill="#78350F" font-size="11">+ suiviTempsReel() : void</text>
  </g>

  <!-- ============================================================ -->
  <!-- AlerteBudget  (droite milieu) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="730" y="510" width="240" height="168" rx="6" fill="#FFE4E6" stroke="#E11D48" stroke-width="1.5"/>
    <rect x="730" y="510" width="240" height="32" rx="6" fill="#E11D48"/>
    <rect x="730" y="528" width="240" height="14" fill="#E11D48"/>
    <text x="850" y="531" text-anchor="middle" fill="white" font-size="13" font-weight="bold">AlerteBudget</text>
    <line x1="730" y1="542" x2="970" y2="542" stroke="#E11D48" stroke-width="1"/>
    <text x="742" y="557" fill="#4C0519" font-size="11">- id : Long</text>
    <text x="742" y="572" fill="#4C0519" font-size="11">- seuilAlerte : Double</text>
    <text x="742" y="587" fill="#4C0519" font-size="11">- typeAlerte : String</text>
    <text x="742" y="602" fill="#4C0519" font-size="11">- message : String</text>
    <text x="742" y="617" fill="#4C0519" font-size="11">- dateEnvoi : Date</text>
    <text x="742" y="632" fill="#4C0519" font-size="11">- estLue : Boolean</text>
    <line x1="730" y1="642" x2="970" y2="642" stroke="#E11D48" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="742" y="657" fill="#4C0519" font-size="11">+ envoyer() : void</text>
    <text x="742" y="672" fill="#4C0519" font-size="11">+ marquerLue() : void</text>
  </g>

  <!-- ============================================================ -->
  <!-- ObjectifEpargne  (gauche bas) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="20" y="790" width="260" height="185" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <rect x="20" y="790" width="260" height="32" rx="6" fill="#16A34A"/>
    <rect x="20" y="808" width="260" height="14" fill="#16A34A"/>
    <text x="150" y="811" text-anchor="middle" fill="white" font-size="13" font-weight="bold">ObjectifEpargne</text>
    <line x1="20" y1="822" x2="280" y2="822" stroke="#16A34A" stroke-width="1"/>
    <text x="32" y="837" fill="#14532D" font-size="11">- id : Long</text>
    <text x="32" y="852" fill="#14532D" font-size="11">- intitule : String</text>
    <text x="32" y="867" fill="#14532D" font-size="11">- montantCible : Double</text>
    <text x="32" y="882" fill="#14532D" font-size="11">- montantActuel : Double</text>
    <text x="32" y="897" fill="#14532D" font-size="11">- dateEcheance : Date</text>
    <text x="32" y="912" fill="#14532D" font-size="11">- priorite : Integer</text>
    <line x1="20" y1="922" x2="280" y2="922" stroke="#16A34A" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="32" y="937" fill="#14532D" font-size="11">+ calculerProgres() : Double</text>
    <text x="32" y="952" fill="#14532D" font-size="11">+ conseilMensuel() : Double</text>
    <text x="32" y="967" fill="#14532D" font-size="11">+ estAtteint() : Boolean</text>
  </g>

  <!-- ============================================================ -->
  <!-- Prevision  (droite bas) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="730" y="790" width="240" height="168" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
    <rect x="730" y="790" width="240" height="32" rx="6" fill="#3B82F6"/>
    <rect x="730" y="808" width="240" height="14" fill="#3B82F6"/>
    <text x="850" y="811" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Prevision</text>
    <line x1="730" y1="822" x2="970" y2="822" stroke="#3B82F6" stroke-width="1"/>
    <text x="742" y="837" fill="#1E3A8A" font-size="11">- id : Long</text>
    <text x="742" y="852" fill="#1E3A8A" font-size="11">- mois : Integer</text>
    <text x="742" y="867" fill="#1E3A8A" font-size="11">- annee : Integer</text>
    <text x="742" y="882" fill="#1E3A8A" font-size="11">- revenuPrevu : Double</text>
    <text x="742" y="897" fill="#1E3A8A" font-size="11">- depensesPrevues : Double</text>
    <text x="742" y="912" fill="#1E3A8A" font-size="11">- excedent : Double</text>
    <line x1="730" y1="922" x2="970" y2="922" stroke="#3B82F6" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="742" y="937" fill="#1E3A8A" font-size="11">+ calculerExcedent() : Double</text>
    <text x="742" y="952" fill="#1E3A8A" font-size="11">+ genererAlerte() : void</text>
  </g>

  <!-- ============================================================ -->
  <!-- Pret  (gauche bas 2) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="20" y="1060" width="260" height="185" rx="6" fill="#FCE7F3" stroke="#DB2777" stroke-width="1.5"/>
    <rect x="20" y="1060" width="260" height="32" rx="6" fill="#DB2777"/>
    <rect x="20" y="1078" width="260" height="14" fill="#DB2777"/>
    <text x="150" y="1081" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Pret</text>
    <line x1="20" y1="1092" x2="280" y2="1092" stroke="#DB2777" stroke-width="1"/>
    <text x="32" y="1107" fill="#500724" font-size="11">- id : Long</text>
    <text x="32" y="1122" fill="#500724" font-size="11">- typePret : String</text>
    <text x="32" y="1137" fill="#500724" font-size="11">- montantTotal : Double</text>
    <text x="32" y="1152" fill="#500724" font-size="11">- capitalRestant : Double</text>
    <text x="32" y="1167" fill="#500724" font-size="11">- tauxInteret : Double</text>
    <text x="32" y="1182" fill="#500724" font-size="11">- dateEcheance : Date</text>
    <line x1="20" y1="1192" x2="280" y2="1192" stroke="#DB2777" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="32" y="1207" fill="#500724" font-size="11">+ calculerMensualite() : Double</text>
    <text x="32" y="1222" fill="#500724" font-size="11">+ impactBudget() : Double</text>
    <text x="32" y="1237" fill="#500724" font-size="11">+ planifierRemboursement() : void</text>
  </g>

  <!-- ============================================================ -->
  <!-- Rapport  (droite bas 2) -->
  <!-- ============================================================ -->
  <g class="class-box">
    <rect x="730" y="1060" width="240" height="168" rx="6" fill="#F3F4F6" stroke="#374151" stroke-width="1.5"/>
    <rect x="730" y="1060" width="240" height="32" rx="6" fill="#374151"/>
    <rect x="730" y="1078" width="240" height="14" fill="#374151"/>
    <text x="850" y="1081" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Rapport</text>
    <line x1="730" y1="1092" x2="970" y2="1092" stroke="#374151" stroke-width="1"/>
    <text x="742" y="1107" fill="#111827" font-size="11">- id : Long</text>
    <text x="742" y="1122" fill="#111827" font-size="11">- type : TypeRapport</text>
    <text x="742" y="1137" fill="#111827" font-size="11">- periode : String</text>
    <text x="742" y="1152" fill="#111827" font-size="11">- dateGeneration : Date</text>
    <text x="742" y="1167" fill="#111827" font-size="11">- format : String</text>
    <line x1="730" y1="1177" x2="970" y2="1177" stroke="#374151" stroke-width="0.5" stroke-dasharray="3"/>
    <text x="742" y="1192" fill="#111827" font-size="11">+ generer() : void</text>
    <text x="742" y="1207" fill="#111827" font-size="11">+ exporter(format) : File</text>
    <text x="742" y="1222" fill="#111827" font-size="11">+ analyserHabitudes() : Stats</text>
  </g>

  <!-- ============================================================ -->
  <!-- RELATIONS / FLÈCHES -->
  <!-- ============================================================ -->

  <!-- Utilisateur → Transaction (1 à 0..*) -->
  <line x1="470" y1="160" x2="200" y2="240" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
  <text x="390" y="190" fill="#555" font-size="10" font-weight="bold">1</text>
  <text x="215" y="238" fill="#555" font-size="10" font-weight="bold">0..*</text>

  <!-- Utilisateur → Budget (1 à 0..*) -->
  <line x1="450" y1="160" x2="190" y2="510" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
  <text x="290" y="450" fill="#555" font-size="10" font-weight="bold">0..*</text>

  <!-- Utilisateur → ObjectifEpargne (1 à 0..*) -->
  <line x1="420" y1="160" x2="160" y2="790" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
  <text x="250" y="740" fill="#555" font-size="10" font-weight="bold">0..*</text>

  <!-- Utilisateur → Pret (1 à 0..*) -->
  <line x1="400" y1="160" x2="130" y2="1060" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
  <text x="195" y="1010" fill="#555" font-size="10" font-weight="bold">0..*</text>

  <!-- Utilisateur → Rapport (1 à 1..*) -->
  <line x1="560" y1="160" x2="820" y2="1060" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
  <text x="745" y="1010" fill="#555" font-size="10" font-weight="bold">1..*</text>

  <!-- Utilisateur → Prevision (1 à 0..*) -->
  <line x1="580" y1="155" x2="840" y2="790" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
  <text x="760" y="735" fill="#555" font-size="10" font-weight="bold">0..*</text>

  <!-- Transaction → Categorie (N à 1) -->
  <line x1="270" y1="332" x2="730" y2="332" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
  <text x="380" y="325" fill="#555" font-size="10" font-weight="bold">N</text>
  <text x="718" y="325" fill="#555" font-size="10" font-weight="bold">1</text>

  <!-- Transaction → TypeTransaction (depend.) -->
  <line x1="200" y1="425" x2="430" y2="350" stroke="#888" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)" fill="none"/>
  <text x="310" y="395" fill="#888" font-size="9">«use»</text>

  <!-- Budget → Categorie (N à 1) -->
  <line x1="280" y1="580" x2="730" y2="340" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" fill="none"/>
  <text x="550" y="465" fill="#555" font-size="10" font-weight="bold">1</text>

  <!-- Budget → AlerteBudget (composition 1 à 0..*) -->
  <line x1="280" y1="625" x2="730" y2="625" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" marker-start="url(#diamond)" fill="none"/>
  <text x="490" y="618" fill="#555" font-size="9">génère 0..*</text>

  <!-- Légende -->
  <rect x="310" y="1080" width="380" height="90" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="1098" text-anchor="middle" fill="#333" font-size="12" font-weight="bold">Légende</text>
  <line x1="326" y1="1116" x2="380" y2="1116" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="388" y="1120" fill="#555" font-size="10">Association / Navigation</text>
  <line x1="326" y1="1136" x2="380" y2="1136" stroke="#888" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="388" y="1140" fill="#555" font-size="10">Dépendance («use»)</text>
  <line x1="326" y1="1156" x2="380" y2="1156" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)" marker-start="url(#diamond)"/>
  <text x="388" y="1160" fill="#555" font-size="10">Composition (losange creux)</text>
</svg>
</body>
</html>
